# ============================================================
# Supabase Keep-Alive Workflow
# ============================================================
# Mục đích : Query Supabase DB định kỳ để tránh bị pause.
# Thực tế   : Supabase free tier pause sau 7 ngày không có DB activity.
# Lịch chạy : Mỗi 5 ngày lúc 02:00 UTC.
#
# Secrets cần cấu hình (Settings → Secrets → Actions):
#   SUPABASE_URL       – vd: https://abcdefgh.supabase.co
#   SUPABASE_ANON_KEY  – anon/public key từ Supabase dashboard
#
# DB Schema (Dace project):
#   - topics      : id, name, slug, icon, order_index, created_at
#   - phrases     : id, topic_id, sample_sentence, next_review_at, ...
#   - study_logs  : id, phrase_id, result, reviewed_at
#
# Query được dùng: SELECT count(*) FROM topics
#   → Bảng nhỏ nhất, không sensitive, luôn có data, không cần filter.
#   → Đảm bảo PostgreSQL thực sự được hit → reset pause timer.
# ============================================================

name: "Supabase Keep-Alive"

on:
  # Mỗi 5 ngày lúc 02:00 UTC — an toàn với free tier 7 ngày
  schedule:
    - cron: "0 2 1,6,11,16,21,26 * *"

  workflow_dispatch:
    inputs:
      reason:
        description: "Lý do chạy thủ công (tùy chọn)"
        required: false
        default: "Manual keep-alive ping"

jobs:
  keep-alive:
    name: "Ping Supabase Database"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ── 1. Kiểm tra secrets ──────────────────────────────────
      - name: "Validate required secrets"
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "ERROR: Secret SUPABASE_URL chua duoc cau hinh!"
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "ERROR: Secret SUPABASE_ANON_KEY chua duoc cau hinh!"
            exit 1
          fi
          echo "OK: Secrets san sang."

      # ── 2. Query bảng topics — hit PostgreSQL thực sự ─────────
      # Dùng /rest/v1/topics?select=count thay vì /rest/v1/ (schema-only).
      # Bảng topics: nhỏ, public read, không sensitive, luôn có data.
      # Header "Prefer: count=exact" buộc Supabase chạy COUNT query trên DB.
      - name: "Query topics table to keep DB alive"
        id: ping
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Time  : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Query : SELECT count(*) FROM topics"
          echo "Target: ${SUPABASE_URL}/rest/v1/topics?select=id&limit=1"
          echo ""

          MAX_RETRIES=3
          RETRY_DELAY=10
          ATTEMPT=0
          HTTP_STATUS=0

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_RETRIES..."

            HTTP_STATUS=$(curl \
              --silent \
              --output /tmp/response.json \
              --write-out "%{http_code}" \
              --max-time 30 \
              --header "apikey: ${SUPABASE_ANON_KEY}" \
              --header "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              --header "Prefer: count=exact" \
              "${SUPABASE_URL}/rest/v1/topics?select=id&limit=1")

            RESPONSE=$(cat /tmp/response.json 2>/dev/null || echo "N/A")
            echo "  HTTP   : $HTTP_STATUS"
            echo "  Body   : $RESPONSE"

            # 200 = query thành công, DB đang sống
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "SUCCESS: Supabase DB ALIVE — topics query OK (HTTP $HTTP_STATUS, attempt $ATTEMPT)"
              echo "http_status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
              echo "attempts=$ATTEMPT"        >> "$GITHUB_OUTPUT"
              exit 0
            fi

            # 401 = anon key không có quyền read topics → cần check RLS
            if [ "$HTTP_STATUS" -eq 401 ]; then
              echo "WARN: HTTP 401 — Supabase RLS may be blocking anon reads on 'topics'."
              echo "  -> Check Supabase Dashboard: Authentication > Policies > topics table"
              echo "  -> Add policy: GRANT SELECT ON topics TO anon"
            fi

            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "  Waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
            fi
          done

          echo "FAILED: DB query failed after $MAX_RETRIES attempts (last HTTP $HTTP_STATUS)"
          echo "http_status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
          echo "attempts=$ATTEMPT"        >> "$GITHUB_OUTPUT"
          exit 1

      # ── 3. Ghi Job Summary ───────────────────────────────────
      - name: "Write Job Summary"
        if: always()
        env:
          STATUS: ${{ steps.ping.outputs.http_status }}
          ATTEMPTS: ${{ steps.ping.outputs.attempts }}
        run: |
          {
            echo "## Supabase Keep-Alive — Dace Project"
            echo ""
            echo "| Info | Value |"
            echo "|------|-------|"
            echo "| Time | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |"
            echo "| Query | \`SELECT id FROM topics LIMIT 1\` |"
            echo "| HTTP Status | \`${STATUS:-N/A}\` |"
            echo "| Attempts | ${ATTEMPTS:-N/A} |"
            echo "| Result | ${{ job.status }} |"
            if [ -n "${{ github.event.inputs.reason }}" ]; then
              echo "| Reason | ${{ github.event.inputs.reason }} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
