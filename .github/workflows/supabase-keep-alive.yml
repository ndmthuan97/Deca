# ============================================================
# Supabase Keep-Alive Workflow
# ============================================================
# Mục đích : Ping Supabase project định kỳ để tránh bị pause.
# Thực tế   : Supabase free tier pause sau 7 ngày không hoạt động.
# Lịch chạy : Mỗi 5 ngày lúc 02:00 UTC (an toàn hơn 6 ngày).
#
# Secrets cần cấu hình (Settings → Secrets → Actions):
#   SUPABASE_URL       – vd: https://abcdefgh.supabase.co
#   SUPABASE_ANON_KEY  – anon/public key từ Supabase dashboard
# ============================================================

name: 🟢 Supabase Keep-Alive

on:
  # ── Tự động: mỗi 5 ngày lúc 02:00 UTC ──────────────────────
  # Dùng ngày cố định thay vì */5 để tránh GitHub cron quirks.
  # 1,6,11,16,21,26,31 → khoảng cách ~5 ngày, an toàn với free tier 7 ngày.
  schedule:
    - cron: "0 2 1,6,11,16,21,26 * *"

  # ── Thủ công từ GitHub Actions tab ──────────────────────────
  workflow_dispatch:
    inputs:
      reason:
        description: "Lý do chạy thủ công (tùy chọn)"
        required: false
        default: "Manual keep-alive ping"

jobs:
  keep-alive:
    name: 🏓 Ping Supabase Project
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ── 1. Kiểm tra secrets ──────────────────────────────────
      - name: 🔍 Validate required secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "❌ Secret SUPABASE_URL chưa được cấu hình!"
            echo "   → Vào Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "❌ Secret SUPABASE_ANON_KEY chưa được cấu hình!"
            exit 1
          fi
          echo "✅ Secrets đã sẵn sàng."

      # ── 2. Ping với retry ────────────────────────────────────
      - name: 🌐 Ping Supabase REST API (with retry)
        id: ping
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "📅 Thời điểm: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "🌐 Target   : ${SUPABASE_URL}/rest/v1/"
          echo ""

          MAX_RETRIES=3
          RETRY_DELAY=10
          ATTEMPT=0
          HTTP_STATUS=0

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "🔄 Lần thử $ATTEMPT/$MAX_RETRIES..."

            HTTP_STATUS=$(curl \
              --silent \
              --output /dev/null \
              --write-out "%{http_code}" \
              --max-time 30 \
              --header "apikey: ${SUPABASE_ANON_KEY}" \
              --header "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              --header "Content-Type: application/json" \
              "${SUPABASE_URL}/rest/v1/")

            echo "   HTTP Status: $HTTP_STATUS"

            # 2xx hoặc 404 đều đồng nghĩa server đang sống
            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 500 ]; then
              echo "✅ Supabase ALIVE! (HTTP $HTTP_STATUS sau $ATTEMPT lần thử)"
              echo "http_status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
              echo "attempts=$ATTEMPT"        >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "   ⏳ Chờ ${RETRY_DELAY}s trước khi thử lại..."
              sleep $RETRY_DELAY
            fi
          done

          echo "❌ Ping FAILED sau $MAX_RETRIES lần thử (HTTP $HTTP_STATUS)"
          echo "http_status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
          echo "attempts=$ATTEMPT"        >> "$GITHUB_OUTPUT"
          exit 1

      # ── 3. Ghi Job Summary ───────────────────────────────────
      - name: 📊 Write Job Summary
        if: always()
        env:
          STATUS: ${{ steps.ping.outputs.http_status }}
          ATTEMPTS: ${{ steps.ping.outputs.attempts }}
        run: |
          {
            echo "## 🟢 Supabase Keep-Alive Report"
            echo ""
            echo "| Thông tin     | Giá trị |"
            echo "|---------------|---------|"
            echo "| 📅 Thời điểm  | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |"
            echo "| 🌐 Endpoint   | \`${{ secrets.SUPABASE_URL }}/rest/v1/\` |"
            echo "| 📡 HTTP Status | \`${STATUS:-N/A}\` |"
            echo "| 🔄 Số lần thử | ${ATTEMPTS:-N/A} |"
            echo "| 🎯 Kết quả    | ${{ job.status == 'success' && '✅ ALIVE' || '❌ FAILED' }} |"
            if [ -n "${{ github.event.inputs.reason }}" ]; then
              echo "| 📝 Lý do      | ${{ github.event.inputs.reason }} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
